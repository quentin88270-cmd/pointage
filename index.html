<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MEDIACO - Pointage</title>
    
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/fr/0/0e/Logo_Mediaco.png">
    <link rel="icon" type="image/png" sizes="192x192" href="https://upload.wikimedia.org/wikipedia/fr/0/0e/Logo_Mediaco.png">
    
    <link rel="manifest" href='data:application/manifest+json,{"name":"MEDIACO POINTAGE","short_name":"MEDIACO","start_url":".","display":"standalone","background_color":"#fbbc04","theme_color":"#fbbc04","icons":[{"src":"https://upload.wikimedia.org/wikipedia/fr/0/0e/Logo_Mediaco.png","sizes":"192x192","type":"image/png"},{"src":"https://upload.wikimedia.org/wikipedia/fr/0/0e/Logo_Mediaco.png","sizes":"512x512","type":"image/png"}]}'>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#fbbc04">

    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; width: 100%;
            overflow: hidden; background-color: #fbbc04;
        }

        /* L'iframe prend tout l'écran */
        iframe {
            width: 100%; 
            height: 100%; 
            border: none;
            display: none; 
        }

        #splash-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #fbbc04;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader {
            border: 6px solid #fff;
            border-top: 6px solid #000;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-family: Arial, sans-serif;
            font-weight: bold;
            color: #000;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="loader"></div>
        <div class="loading-text">Chargement MEDIACO...</div>
    </div>

    <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbw2rKJ6ssrFiFKNcX8EwPTl4RFFueAOhlgcI64q0OhKwTZCmIdZCS0qdr3A-zTxN1GBfA/exec" onload="hideLoader()"></iframe>

    <script>
        function hideLoader() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('app-frame').style.display = 'block';
        }

        // Sécurité si le chargement dépasse 15 sec
        setTimeout(function() {
            hideLoader();
        }, 15000);
    </script>

</body>
</html>
